<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abrsh birthday</title>

<style>
body{
  margin:0;
  padding:0;
  background:black;
  overflow:hidden;
  font-family: Arial;
}

/* 🔽 DROP ANIMATION */
.drop{
  opacity:0;
  transform: translateY(-120px);
  transition: all 0.8s ease;
}

.show{
  opacity:1;
  transform: translateY(0);
}

/* TEXT */
h1, h2, p{
  color:white;
  text-align:center;
}

h2{
  margin-top:40px;
}

p{
  margin-top:20px;
  font-size:20px;
}

/* VIDEO BACKGROUND */
.back{
  position:fixed;
  right:0;
  bottom:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* 🔥 BUTTON (GLOW FOR BLACK BG) */
button{
  display:block;
  margin:50px auto;
  padding:20px 40px;
  font-size:25px;
  border:none;
  border-radius:40px;
  background:white;
  color:#333;

  box-shadow: 0 0 20px white;
  transition:0.3s;
}

button:hover{
  transform: translateY(-5px);
  box-shadow: 0 0 30px white, 0 0 60px orange;
  cursor:pointer;
}

button a{
  text-decoration:none;
  color:#333;
}

/* FOOTER */
footer{
  text-align:center;
  background:block;
  color:white;
  padding:10px;
  position:absolute;
  bottom:0;
  width:100%;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay loop muted class="back">
  <source src="seidf.mp4" type="video/mp4">
</video>

<h2 class="drop">أفضل صديق</h2>

<h1 class="drop">Dear Abreham</h1>

<p class="drop">🎊🎊🎉Have a Nice Birthday🎉🎉🎊</p>

<button class="drop">
  <a href="D33.html">Welcome bro</a>
</button>
<p class="drop"> 2018/07/17</p>
<footer class="drop">
  &copy; from 2026 seid (أفضل صديق) zayd (ابن نسرو)
</footer>
<button onclick="playMusic()" class="drop">▶ Play Music</button>

<script>
function playMusic(){
  document.getElementById("bg-music").play();
}

</script>
<audio id="bg-music" loop>
  <source src="Abrsh66.mp3" type="audio/mp3">
</audio>

<script>
window.onload = () => {
  const music = document.getElementById("bg-music");

  music.volume = 0.3; 

  music.play().catch(() => {
    // If autoplay blocked → play on first clic
    document.addEventListener("click", () => {
      music.play();
    }, { once: true });
  });
};
</script>
<script>
window.onload = () => {

  const items = document.querySelectorAll('.drop');
  items.forEach((item, index) => {
    setTimeout(() => {
      item.classList.add('show');
    }, index * 400);
  });

  // 🎵 MUSIC AUTOPLAY FIX
  const music = document.getElementById("bg-music");
  music.volume = 0.3;

  music.play().catch(() => {
    document.addEventListener("click", () => {
      music.play();
    }, { once: true });
  });

};
</script>

</body>
</html>
