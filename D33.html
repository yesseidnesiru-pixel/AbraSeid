<script>
let musicPlaying = false; // Track if music is playing

// Toggle Play/Pause functionality
function toggleMusic(){
  const music = document.getElementById("bg-music");
  const musicBtn = document.getElementById("musicBtn");

  if (musicPlaying) {
    music.pause();  // Pause the music
    musicBtn.textContent = '▶ Play Music';  // Change button text
  } else {
    music.play();   // Play the music
    musicBtn.textContent = '⏸ Pause Music';  // Change button text
  }
  musicPlaying = !musicPlaying;  // Toggle the state
}

// Drop-down animation for elements
window.onload = () => {
  const items = document.querySelectorAll('.drop');
  items.forEach((item, index) => {
    setTimeout(() => {
      item.classList.add('show');
    }, index * 400);
  });

  // 🎵 MUSIC AUTOPLAY FIX
  const music = document.getElementById("bg-music");
  music.volume = 0.3;

  music.play().catch(() => {
    document.addEventListener("click", () => {
      music.play();
    }, { once: true });
  });
};
</script>
